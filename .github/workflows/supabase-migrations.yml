name: Supabase Migrations

# Applique AUTOMATIQUEMENT les migrations SQL (supabase/migrations/**) sur le
# projet Supabase de production à chaque fusion sur `main`. Forward-only :
# `supabase db push` n'exécute que les migrations non encore appliquées (les
# migrations déjà jouées sont ignorées), donc le rejeu est sûr.
#
# Secrets requis — Settings → Secrets and variables → Actions :
#   SUPABASE_ACCESS_TOKEN  jeton d'accès personnel (Account → Access Tokens)
#   SUPABASE_PROJECT_ID    référence du projet (Project Settings → General → Reference ID)
#   SUPABASE_DB_PASSWORD   mot de passe de la base (Project Settings → Database)
#
# Déclenchement manuel possible (workflow_dispatch) pour rattraper un retard
# de migrations sans nouveau commit.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-migrations.yml'
  workflow_dispatch: {}

permissions:
  contents: read

# Jamais deux pushs concurrents sur la base ; on ne coupe pas un run en cours
# (une migration ne doit pas être interrompue en plein milieu).
concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  db-push:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Vérifier les secrets
        run: |
          missing=
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && missing="$missing SUPABASE_ACCESS_TOKEN"
          [ -z "$SUPABASE_PROJECT_ID" ] && missing="$missing SUPABASE_PROJECT_ID"
          [ -z "$SUPABASE_DB_PASSWORD" ] && missing="$missing SUPABASE_DB_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Secret(s) manquant(s) :$missing — voir l'en-tête du workflow pour les définir."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Lier le projet
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Appliquer les migrations
        run: supabase db push
