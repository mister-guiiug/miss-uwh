# CI déléguée au reusable workflow famille (dev-wpa-config).
name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  ci:
    uses: mister-guiiug/dev-wpa-config/.github/workflows/pwa-ci.yml@v3
    secrets: inherit
    with:
      run-e2e: true
      e2e-grep: '@critical'
      e2e-project: chromium
