<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f766e" />
    <meta
      name="description"
      content="Miss UWH — bilan comptable saisonnier d’un club de Hockey Subaquatique : journal, recettes/dépenses par catégorie, clôture de saison, justificatifs."
    />
    <!-- Anti-FOUC : applique le thème avant le premier rendu. -->
    <script>
      (function () {
        try {
          var k = 'miss-uwh:theme';
          var v = localStorage.getItem(k);
          var eff =
            v === 'light' || v === 'dark'
              ? v
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.dataset.theme = eff;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Polices chargées en non-bloquant (media="print" -> "all" à l'onload) :
      la feuille de style distante ne bloque plus le rendu, ce qui évitait
      l'avertissement « mise en page forcée avant le chargement complet »
      (FOUC). display=swap affiche d'abord la police système puis échange.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <title>Miss UWH — Bilan comptable Hockey Subaquatique</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
